workflows:
  flutter-android:
    name: Flutter Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --split-per-abi
    artifacts:
      - build/app/outputs/apk/release/*.apk

